name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  foundry:
    name: Foundry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install npm dependencies
        run: npm install

      - name: Check formatting
        run: forge fmt --check

      - name: Run tests
        run: forge test
